<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KebabFinder Global - El teu Àlbum de Kebabs</title>
    <!-- Tailwind CSS per estils ràpids i moderns -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estils personalitzats i variables */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #FFF8F0; /* Fons crema per defecte */
            scroll-behavior: smooth; 
            overflow-x: hidden; 
        }

        /* Animació de càrrega estil durum */
        .kebab-loader {
            border: 5px solid #ffedd5;
            border-top: 5px solid #ea580c;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Efectes visuals per a la interfície */
        .drawer-overlay { 
            background-color: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(4px); 
            transition: opacity 0.3s ease; 
        }

        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #ddd; cursor: pointer; transition: color 0.2s; font-size: 1.8rem; }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label { color: #facc15; }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Glassmorphism effects */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- Dependències de React i Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // La clau API es gestiona internament per l'entorn
        const apiKey = ""; 

        // Sistema d'icones SVG per no dependre de llibreries externes pesades
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                menu: <path d="M4 6h16M4 12h16M4 18h16" />,
                search: <React.Fragment><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></React.Fragment>,
                x: <path d="M18 6 6 18M6 6l12 12" />,
                star: <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />,
                navigation: <path d="M3 11l19-9-9 19-2-8-8-2z" />,
                arrowLeft: <path d="m12 19-7-7 7-7M5 12h14" />,
                bookPlus: <React.Fragment><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" /><path d="M12 7v6" /><path d="M9 10h6" /></React.Fragment>,
                bookCheck: <React.Fragment><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" /><path d="m9 10 2 2 4-4" /></React.Fragment>,
                chevronRight: <path d="m9 18 6-6-6-6" />,
                settings: <React.Fragment><path d="M12.22 2h-.44a2 2 0 0 0-2 2a2 2 0 0 1-2 2a2 2 0 0 0-2 2v.44a2 2 0 0 0 2 2a2 2 0 0 1 2 2a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2a2 2 0 0 1 2-2a2 2 0 0 0 2-2V7.78a2 2 0 0 0-2-2a2 2 0 0 1-2-2a2 2 0 0 0-2-2ZM12 15a3 3 0 1 0 0-6a3 3 0 0 0 0 6Z"/></React.Fragment>,
                upload: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />
            };

            return (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const translations = {
            ca: {
                search: "Troba el millor durum",
                placeholder: "Ciutat o poble...",
                back: "Tornar",
                reviews: "Crítiques de la comunitat",
                write_review: "Explica la teva experiència...",
                publish: "Publicar",
                arrival: "Com arribar-hi",
                profile: "Perfil Kebaber",
                language: "Idioma",
                scanning: "Buscant els millors talls de carn...",
                view_details: "Saber-ne més",
                rating: "Nota:",
                my_album: "La meva col·lecció",
                empty_album: "L'àlbum està buit. Comença a buscar!",
                added: "Guardat a l'àlbum",
                save_changes: "Guardar perfil",
                upload_photo: "Pujar foto pròpia",
                edit_profile: "Editar el meu perfil",
                name_label: "Nom",
                nickname_label: "Mote / Àlies",
                avatar_label: "Imatge de perfil"
            }
        };

        const DEFAULT_AVATARS = [
            "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix",
            "https://api.dicebear.com/7.x/bottts/svg?seed=Kebab1",
            "https://api.dicebear.com/7.x/fun-emoji/svg?seed=Durum",
            "https://api.dicebear.com/7.x/shapes/svg?seed=Spicy"
        ];

        const App = () => {
            const [view, setView] = useState('home'); 
            const [lang, setLang] = useState('ca');
            const [drawerOpen, setDrawerOpen] = useState(false);
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            
            // Estat de l'usuari
            const [userData, setUserData] = useState({ 
                name: "Explorador de Salses", 
                nickname: "El Rei del Durum", 
                avatar: DEFAULT_AVATARS[0],
                collection: [] 
            });

            const [editForm, setEditForm] = useState({ ...userData });
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [selectedKebab, setSelectedKebab] = useState(null);
            const [aiInsight, setAiInsight] = useState('');
            const [aiLoading, setAiLoading] = useState(false);
            const [reviews, setReviews] = useState({});
            const [newReview, setNewReview] = useState({ rating: 5, text: '' });

            const fileInputRef = useRef(null);
            const t = translations[lang] || translations['ca'];

            // Funcions de gestió de perfil
            const handleSaveProfile = (e) => {
                e.preventDefault();
                setUserData({ ...userData, ...editForm });
                setIsEditingProfile(false);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setEditForm({ ...editForm, avatar: reader.result });
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Lògica de col·lecció
            const toggleCollection = (kebab) => {
                const key = kebab.id || kebab.nom;
                const exists = userData.collection.find(item => (item.id || item.nom) === key);
                if (exists) {
                    setUserData(prev => ({ ...prev, collection: prev.collection.filter(item => (item.id || item.nom) !== key) }));
                } else {
                    setUserData(prev => ({ ...prev, collection: [...prev.collection, kebab] }));
                }
            };

            const isKebabInCollection = (kebab) => {
                if (!kebab) return false;
                return userData.collection.some(item => (item.id || item.nom) === (kebab.id || kebab.nom));
            };

            // API Calls
            const searchKebabs = async (location) => {
                if (!location) return;
                setLoading(true);
                const prompt = `Search for the 6 best real kebab restaurants in ${location}. Return ONLY a JSON object: {"kebabs": [{"id": "1", "nom": "Name", "valoracio": 4.5, "adreca": "Address", "preu": "€"}]}`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], tools: [{ "google_search": {} }] })
                    });
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                    const clean = text.replace(/```json/g, '').replace(/```/g, '').trim();
                    const parsed = JSON.parse(clean);
                    setResults(parsed.kebabs || []);
                } catch (err) {
                    console.error("Error cercant kebabs:", err);
                } finally {
                    setLoading(false);
                }
            };

            const getAiInsight = async (kebab) => {
                setAiLoading(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `Dona'm una frase curta i divertida per què anar a menjar a ${kebab.nom} a ${kebab.adreca}. Idioma: ${lang}.` }] }] })
                    });
                    const data = await response.json();
                    setAiInsight(data.candidates[0].content.parts[0].text);
                } catch (e) {
                    setAiInsight("Una opció segura per a la teva gana.");
                } finally {
                    setAiLoading(false);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Sidebar / Drawer */}
                    {drawerOpen && (
                        <div className="fixed inset-0 z-50 flex">
                            <div className="drawer-overlay absolute inset-0" onClick={() => {setDrawerOpen(false); setIsEditingProfile(false);}}></div>
                            <div className="drawer-content relative w-85 max-w-[90%] bg-white h-full shadow-2xl p-6 flex flex-col overflow-y-auto animate-fade-in">
                                
                                {isEditingProfile ? (
                                    <div className="animate-fade-in">
                                        <div className="flex justify-between items-center mb-8">
                                            <h2 className="text-xl font-black uppercase tracking-tighter">{t.edit_profile}</h2>
                                            <button onClick={() => setIsEditingProfile(false)} className="p-2 bg-gray-50 rounded-full"><Icon name="x" /></button>
                                        </div>
                                        <form onSubmit={handleSaveProfile} className="space-y-6">
                                            <div className="text-center">
                                                <label className="text-[10px] font-black uppercase text-gray-400 block mb-4 tracking-widest">{t.avatar_label}</label>
                                                <div className="flex flex-col items-center gap-4">
                                                    <div className="w-28 h-28 bg-orange-50 rounded-[2rem] overflow-hidden border-4 border-white shadow-xl">
                                                        <img src={editForm.avatar} className="w-full h-full object-cover" />
                                                    </div>
                                                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleFileUpload} />
                                                    <button type="button" onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 px-5 py-2.5 bg-black text-white rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg">
                                                        <Icon name="upload" className="w-3 h-3" /> {t.upload_photo}
                                                    </button>
                                                </div>
                                                <div className="grid grid-cols-4 gap-2 mt-6">
                                                    {DEFAULT_AVATARS.map((av, idx) => (
                                                        <button key={idx} type="button" onClick={() => setEditForm({...editForm, avatar: av})} className={`p-1 rounded-xl border-2 transition-all ${editForm.avatar === av ? 'border-orange-600 scale-105' : 'border-transparent'}`}>
                                                            <img src={av} className="w-full rounded-lg bg-gray-100" />
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <div>
                                                    <label className="text-[10px] font-black uppercase text-gray-400 block mb-1 tracking-widest">{t.name_label}</label>
                                                    <input type="text" value={editForm.name} onChange={e => setEditForm({...editForm, name: e.target.value})} className="w-full bg-gray-50 p-4 rounded-xl border-2 border-transparent focus:border-orange-500 outline-none font-bold" />
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-black uppercase text-gray-400 block mb-1 tracking-widest">{t.nickname_label}</label>
                                                    <input type="text" value={editForm.nickname} onChange={e => setEditForm({...editForm, nickname: e.target.value})} className="w-full bg-gray-50 p-4 rounded-xl border-2 border-transparent focus:border-orange-500 outline-none font-bold" />
                                                </div>
                                            </div>
                                            <button type="submit" className="w-full bg-orange-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-orange-100">{t.save_changes}</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="flex flex-col h-full">
                                        <div className="flex justify-between items-center mb-8">
                                            <h2 className="text-xl font-black uppercase tracking-tighter">Menú</h2>
                                            <button onClick={() => setDrawerOpen(false)} className="p-2 bg-gray-50 rounded-full"><Icon name="x" /></button>
                                        </div>
                                        
                                        <div className="relative mb-8 group cursor-pointer" onClick={() => {setEditForm({...userData}); setIsEditingProfile(true);}}>
                                            <div className="flex flex-col items-center gap-3 p-8 bg-orange-600 rounded-[3rem] shadow-2xl text-white transform transition-transform group-hover:scale-[1.02]">
                                                <div className="w-24 h-24 bg-white rounded-3xl overflow-hidden border-4 border-white/20 shadow-inner">
                                                    <img src={userData.avatar} className="w-full h-full object-cover" />
                                                </div>
                                                <div className="text-center">
                                                    <p className="font-black text-2xl tracking-tighter">{userData.name}</p>
                                                    <p className="text-[10px] uppercase text-orange-200 font-black tracking-widest mt-1 opacity-80">{userData.nickname}</p>
                                                </div>
                                            </div>
                                            <div className="absolute -top-2 -right-2 p-3 bg-white text-orange-600 rounded-2xl shadow-xl border border-orange-50">
                                                <Icon name="settings" className="w-5 h-5" />
                                            </div>
                                        </div>

                                        <button onClick={() => { setView('album'); setDrawerOpen(false); }} className="w-full flex items-center justify-between p-5 bg-orange-50 rounded-3xl hover:bg-orange-100 transition-colors mb-4">
                                            <div className="flex items-center gap-3">
                                                <div className="p-2.5 bg-orange-600 rounded-xl text-white shadow-md"><Icon name="bookPlus" /></div>
                                                <span className="font-black text-sm uppercase tracking-tight">{t.my_album}</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <span className="bg-orange-200 text-orange-700 px-3 py-1 rounded-full text-[10px] font-black">{userData.collection.length}</span>
                                                <Icon name="chevronRight" className="w-4 h-4 text-orange-300" />
                                            </div>
                                        </button>

                                        <div className="mt-auto pt-6 border-t border-gray-100">
                                            <p className="text-[10px] font-black uppercase text-gray-400 mb-4 tracking-widest">{t.language}</p>
                                            <div className="grid grid-cols-2 gap-2">
                                                {['ca', 'es', 'en', 'fr'].map(l => (
                                                    <button key={l} onClick={() => setLang(l)} className={`py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all ${lang === l ? 'bg-black text-white shadow-lg scale-105' : 'bg-gray-100 text-gray-400'}`}>{l}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Header Principal */}
                    <header className="bg-white/90 backdrop-blur-md border-b sticky top-0 z-40 p-4 shadow-sm flex items-center justify-between">
                        <button onClick={() => setDrawerOpen(true)} className="p-1 flex items-center gap-3 hover:bg-orange-50 rounded-full pr-4 transition-all group">
                            <div className="w-10 h-10 rounded-xl bg-orange-100 overflow-hidden shadow-sm group-hover:shadow-md transition-shadow border-2 border-white">
                                <img src={userData.avatar} className="w-full h-full object-cover" />
                            </div>
                            <Icon name="menu" className="text-gray-800" />
                        </button>
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                            <div className="bg-orange-600 p-2 rounded-xl text-white shadow-lg"><Icon name="star" className="w-5 h-5" /></div>
                            <h1 className="text-2xl font-black tracking-tighter uppercase text-gray-900">Kebab<span className="text-orange-600">Finder</span></h1>
                        </div>
                        <div className="w-12"></div>
                    </header>

                    {/* Vista Home */}
                    {view === 'home' && (
                        <main className="max-w-4xl mx-auto px-4 py-12 animate-fade-in">
                            <div className="text-center mb-16">
                                <h2 className="text-5xl md:text-6xl font-black mb-8 tracking-tighter leading-[0.9] text-gray-900">{t.search}</h2>
                                <form onSubmit={(e) => { e.preventDefault(); searchKebabs(query); }} className="relative max-w-lg mx-auto">
                                    <input type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder={t.placeholder} className="w-full px-8 py-6 rounded-[2.5rem] border-2 border-orange-100 outline-none focus:border-orange-500 shadow-2xl transition-all text-lg bg-white" />
                                    <button className="absolute right-3 top-3 bottom-3 bg-orange-600 text-white px-8 rounded-full hover:bg-orange-700 transition-all shadow-lg active:scale-95"><Icon name="search" /></button>
                                </form>
                            </div>

                            {loading && (
                                <div className="flex flex-col items-center py-20">
                                    <div className="kebab-loader mb-6"></div>
                                    <p className="text-xs font-black uppercase tracking-[0.3em] text-orange-600 animate-pulse">{t.scanning}</p>
                                </div>
                            )}

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {results.map((k, i) => (
                                    <div key={i} onClick={() => { setSelectedKebab(k); setView('detail'); getAiInsight(k); }} className="glass-card p-8 rounded-[3rem] shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all cursor-pointer group animate-fade-in border border-white" style={{animationDelay: `${i * 0.1}s`}}>
                                        <div className="flex justify-between items-start mb-4">
                                            <h3 className="font-black text-2xl tracking-tight leading-none group-hover:text-orange-600 transition-colors">{k.nom}</h3>
                                            {isKebabInCollection(k) && <div className="p-2 bg-orange-100 rounded-xl text-orange-600"><Icon name="bookCheck" /></div>}
                                        </div>
                                        <p className="text-[10px] text-gray-400 font-bold uppercase mb-6 tracking-widest">{k.adreca}</p>
                                        <div className="flex justify-between items-center">
                                            <span className="bg-yellow-400/20 text-yellow-700 px-4 py-1.5 rounded-full font-black text-sm flex items-center gap-1.5">⭐ {k.valoracio}</span>
                                            <span className="text-orange-600 text-[10px] font-black uppercase flex items-center gap-2 group-hover:gap-4 transition-all">{t.view_details} <Icon name="chevronRight" className="w-3 h-3" /></span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    )}

                    {/* Vista Àlbum */}
                    {view === 'album' && (
                        <main className="max-w-4xl mx-auto px-4 py-10 animate-fade-in">
                            <button onClick={() => setView('home')} className="flex items-center gap-2 text-gray-400 hover:text-orange-600 font-black text-xs uppercase tracking-widest mb-10 transition-colors"><Icon name="arrowLeft" className="w-4 h-4" /> {t.back}</button>
                            <h2 className="text-5xl font-black mb-12 tracking-tighter uppercase text-gray-900">{t.my_album}</h2>
                            
                            {userData.collection.length === 0 ? (
                                <div className="text-center py-24 glass-card rounded-[4rem] border-2 border-dashed border-orange-200">
                                    <div className="bg-orange-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                                        <Icon name="bookPlus" className="text-orange-300 w-10 h-10" />
                                    </div>
                                    <p className="text-gray-400 font-black uppercase text-[10px] tracking-[0.2em]">{t.empty_album}</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    {userData.collection.map((k, i) => (
                                        <div key={i} onClick={() => { setSelectedKebab(k); setView('detail'); getAiInsight(k); }} className="bg-white p-6 rounded-[2.5rem] shadow-md hover:shadow-xl transition-all cursor-pointer group border-l-[6px] border-orange-600">
                                            <div className="flex justify-between items-start mb-2">
                                                <h3 className="font-black text-xl truncate pr-4 group-hover:text-orange-600">{k.nom}</h3>
                                                <Icon name="bookCheck" className="text-orange-600 w-5 h-5 flex-shrink-0" />
                                            </div>
                                            <p className="text-[9px] text-gray-400 font-bold uppercase truncate mb-4">{k.adreca}</p>
                                            <div className="flex items-center justify-between">
                                                <span className="text-yellow-600 font-black text-sm">★ {k.valoracio}</span>
                                                <span className="text-orange-600 text-[10px] font-black uppercase tracking-widest">{t.view_details}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </main>
                    )}

                    {/* Vista Detall */}
                    {view === 'detail' && selectedKebab && (
                        <div className="max-w-2xl mx-auto px-4 py-10 animate-fade-in">
                            <div className="flex justify-between items-center mb-8">
                                <button onClick={() => setView('home')} className="flex items-center gap-2 text-gray-400 hover:text-black font-black text-[10px] uppercase tracking-widest transition-all"><Icon name="arrowLeft" /> {t.back}</button>
                                <button onClick={() => toggleCollection(selectedKebab)} className={`p-5 rounded-[2rem] transition-all shadow-xl active:scale-90 ${isKebabInCollection(selectedKebab) ? 'bg-orange-600 text-white rotate-[360deg]' : 'bg-white text-orange-600 border border-orange-100 hover:bg-orange-50'}`}>
                                    <Icon name={isKebabInCollection(selectedKebab) ? "bookCheck" : "bookPlus"} className="w-6 h-6" />
                                </button>
                            </div>

                            <div className="bg-white rounded-[3.5rem] shadow-2xl overflow-hidden mb-10 border border-gray-100">
                                <div className="h-60 bg-orange-600 flex flex-col items-center justify-center relative p-8">
                                    <div className="absolute inset-0 opacity-10 bg-[radial-gradient(circle,white_1px,transparent_1px)] bg-[size:25px_25px]"></div>
                                    <h2 className="text-4xl md:text-5xl font-black text-white text-center z-10 tracking-tighter leading-none mb-4">{selectedKebab.nom}</h2>
                                    {isKebabInCollection(selectedKebab) && <span className="bg-white/20 backdrop-blur-md text-white text-[9px] font-black uppercase px-4 py-1.5 rounded-full tracking-[0.2em]">{t.added}</span>}
                                </div>
                                <div className="p-10">
                                    <div className="bg-orange-50/50 p-8 rounded-[2.5rem] mb-10 border border-orange-100 relative shadow-inner">
                                        <div className="absolute -top-3 left-10 bg-black text-white px-4 py-1 rounded-full text-[9px] font-black uppercase tracking-[0.2em] shadow-lg">IA Review</div>
                                        <p className="text-lg font-bold italic text-gray-700 leading-relaxed pt-2">"{aiLoading ? 'Calculant sabors...' : aiInsight}"</p>
                                    </div>
                                    <button onClick={() => window.open(`https://maps.google.com/?q=${selectedKebab.nom} ${selectedKebab.adreca}`)} className="w-full bg-black text-white py-6 rounded-3xl font-black text-xs uppercase tracking-[0.3em] flex items-center justify-center gap-4 hover:bg-gray-800 transition-all shadow-2xl active:translate-y-1"><Icon name="navigation" /> {t.arrival}</button>
                                </div>
                            </div>

                            <div className="bg-white rounded-[3.5rem] p-10 shadow-sm border border-gray-100">
                                <h3 className="text-2xl font-black mb-8 tracking-tighter uppercase">{t.reviews}</h3>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    if (!newReview.text) return;
                                    const id = selectedKebab.id || selectedKebab.nom;
                                    const review = { user: userData.name, text: newReview.text, rating: newReview.rating, date: new Date().toLocaleDateString() };
                                    setReviews(prev => ({ ...prev, [id]: [review, ...(prev[id] || [])] }));
                                    setNewReview({ rating: 5, text: '' });
                                }} className="mb-12 space-y-6">
                                    <div className="flex items-center justify-between bg-gray-50 p-5 rounded-2xl">
                                        <span className="text-[10px] font-black uppercase text-gray-400 tracking-widest">{t.rating}</span>
                                        <div className="star-rating">
                                            {[5, 4, 3, 2, 1].map(num => (
                                                <React.Fragment key={num}>
                                                    <input type="radio" id={`star-${num}`} name="rating" value={num} checked={newReview.rating === num} onChange={() => setNewReview({...newReview, rating: num})} />
                                                    <label htmlFor={`star-${num}`}>★</label>
                                                </React.Fragment>
                                            ))}
                                        </div>
                                    </div>
                                    <textarea value={newReview.text} onChange={e => setNewReview({...newReview, text: e.target.value})} className="w-full bg-gray-50 rounded-[2rem] p-6 text-sm outline-none h-28 border-2 border-transparent focus:border-orange-500 transition-all resize-none shadow-inner" placeholder={t.write_review}></textarea>
                                    <button className="bg-orange-600 text-white px-10 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl shadow-orange-100 hover:scale-105 active:scale-95 transition-all">{t.publish}</button>
                                </form>
                                <div className="space-y-10">
                                    {(reviews[selectedKebab.id || selectedKebab.nom] || []).map((r, i) => (
                                        <div key={i} className="border-b border-gray-50 pb-8 last:border-0 animate-fade-in">
                                            <div className="flex justify-between items-center mb-4">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-10 h-10 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center text-xs font-black shadow-sm uppercase">{r.user[0]}</div>
                                                    <div>
                                                        <p className="font-black text-sm text-gray-900">{r.user}</p>
                                                        <p className="text-[9px] text-gray-400 font-bold uppercase tracking-widest">{r.date}</p>
                                                    </div>
                                                </div>
                                                <div className="flex text-yellow-500 text-sm">
                                                    {[...Array(r.rating)].map((_, idx) => <span key={idx}>★</span>)}
                                                </div>
                                            </div>
                                            <p className="text-gray-600 ml-14 leading-relaxed text-sm">{r.text}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('app'));
        root.render(<App />);
    </script>
